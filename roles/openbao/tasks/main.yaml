---
# tasks file for openbao

- name: Run pre-flight checks
  ansible.builtin.include_tasks:
    file: pre-flight.yaml

- name: Install on Arch Linux
  ansible.builtin.include_tasks:
    file: arch.yaml
  when: >-
    ansible_facts.distribution == 'Archlinux'

- name: Configure OpenBao
  ansible.builtin.include_tasks:
    file: configure.yaml

- name: Set up the OpenBao firewall rules
  ansible.builtin.include_tasks:
    file: firewall.yaml

- name: Set up OpenBao
  ansible.builtin.include_tasks:
    file: service.yaml
