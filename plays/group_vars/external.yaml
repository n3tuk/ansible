---
env_purpose: external-node

filesystems_physical_drives:
  - vda

filesystems_physical_partitions:
  - name: GRUB
    device: vda
    number: 1
    start: 1MiB
    end: 3MiB
    flags:
      - bios_grub
  - name: ESP
    device: vda
    number: 2
    path: /efi
    start: 3MiB
    end: 256MiB
    flags:
      - esp
    pv_type: fat32
    fs_type: vfat
    fs_opts: -F 32 -n ESP
  - name: LVM
    device: vda
    number: 3
    start: 256MiB
    end: 100%
    flags:
      - lvm

filesystems_volume_groups:
  - name: storage
    partitions:
      - /dev/vda3

filesystems_logical_volumes:
  - name: system
    group: storage
    path: /
    size: 8G
    fs_type: ext4
    fs_opts: -L SYSTEM
  - name: swap
    group: storage
    size: 1G
    fs_type: swap
    fs_opts: -L SWAP
  - name: journald
    group: storage
    path: /var/log/journal
    size: 256M
    fs_type: ext4
    fs_opts: -L JOURNALD
    mount_opts:
      - nosuid
  - name: pacman
    group: storage
    path: /var/cache/pacman
    size: 2G
    fs_type: ext4
    fs_opts: -L PACMAN
    mount_opts:
      - nosuid
      - nodev
      - noexec
  - name: home
    group: storage
    path: /home
    size: 256M
    fs_type: ext4
    fs_opts: -L HOME
    mount_opts:
      - nosuid
      - nodev
  - name: bind
    group: storage
    path: /var/lib/bind
    size: 1G
    fs_type: ext4
    fs_opts: -L BIND
    mount_opts:
      - nosuid
  - name: openbao
    group: storage
    path: /var/lib/openbao
    size: 4G
    fs_type: ext4
    fs_opts: -L OPENBAO
    mount_opts:
      - nosuid

# These nodes are not QEMU hosts, so remove the QEMU packages from the pacstrap
# installation step, but we do require GRUB instead, so add that to the list
bootstrap_pacstrap_extras:
  - grub

# These are nodes running via Mythic Beasts on KVM hypervisors with only BIOS
# boot support, so must use GRUB as the bootloader
kernels_bootloader: grub

# This node is outside the Bridgend network, therefore the default firewall
# rules which include internal IPv4 addresses is not appropriate. Add a custom
# set of rules which to allow SSH from anywhere (these are dedicated remote
# access hosts).
ufw_default_rules:
  - rule: allow
    proto: tcp
    port: 22
    comment: Allow SSH from anywhere

