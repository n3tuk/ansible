---
env_purpose: bind-node (dns)

filesystems_physical_drives:
  - vda
  - vdb

filesystems_physical_partitions:
  - name: ESP
    device: vda
    number: 1
    path: /efi
    start: 1MiB
    end: 256MiB
    flags:
      - esp
    pv_type: fat32
    fs_type: vfat
    fs_opts: -F 32 -n ESP
  - name: LVM
    device: vda
    number: 2
    start: 256MiB
    end: 100%
    flags:
      - lvm
  - name: LVM
    device: vdb
    number: 1
    start: 1MiB
    end: 100%
    flags:
      - lvm

filesystems_volume_groups:
  - name: storage
    partitions:
      - /dev/vda2
  - name: data
    partitions:
      - /dev/vdb1

filesystems_logical_volumes:
  - name: system
    group: storage
    path: /
    size: 8G
    fs_type: ext4
    fs_opts: -L SYSTEM
  - name: swap
    group: storage
    size: 1G
    fs_type: swap
    fs_opts: -L SWAP
  - name: journald
    group: storage
    path: /var/log/journal
    size: 256M
    fs_type: ext4
    fs_opts: -L JOURNALD
    mount_opts:
      - nosuid
  - name: pacman
    group: storage
    path: /var/cache/pacman
    size: 2G
    fs_type: ext4
    fs_opts: -L PACMAN
    mount_opts:
      - nosuid
      - nodev
      - noexec
  - name: home
    group: storage
    path: /home
    size: 256M
    fs_type: ext4
    fs_opts: -L HOME
    mount_opts:
      - nosuid
      - nodev
  - name: named
    group: data
    path: /var/lib/named
    size: 1G
    fs_type: ext4
    fs_opts: -L NAMED
    mount_opts:
      - nosuid

tailscale_auth_key: !vault |
  $ANSIBLE_VAULT;1.1;AES256
  30653632666130373762613231366537616339643935373864303836313163393134626161623136
  6637316364363338653937666334613461393133303333660a373932393833333731326639643433
  62323363646430633962613361323833613737396636376136346435343038663134626237323266
  3766643130616565330a356439303536623333613234623034383733633134396336333634616533
  31333737333830383363373163353938313436653831356638376533663337356561643933316362
  64376666623337366535616162636465303537333939303337346431353437316432616132313336
  663663626461656530393766313137323237

