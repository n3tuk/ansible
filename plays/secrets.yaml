---
- name: Configure Secrets Manager Servers
  hosts: secrets
  become: true
  become_user: root

  pre_tasks:
    - name: Gather facts from all OpenBao hosts
      ansible.builtin.setup:
      delegate_to: "{{ item }}"
      delegate_facts: true
      when: >-
        hostvars[item].ansible.default_ipv4 is not defined and
        hostvars[item].ansible.default_ipv6 is not defined
      with_items: "{{ groups[openbao_group_name] }}"
    - name: Gather facts from all CA hosts
      ansible.builtin.setup:
      delegate_to: "{{ item }}"
      delegate_facts: true
      when: >-
        hostvars[item].ansible.default_ipv4 is not defined and
        hostvars[item].ansible.default_ipv6 is not defined
      with_items: "{{ groups['ca'] }}"

  roles:
    - role: ufw
      tags:
        - ufw
    - role: tailscale
      tags:
        - tailscale
    - role: lego
      tags:
        - lego
    - role: openbao
      tags:
        - openbao
